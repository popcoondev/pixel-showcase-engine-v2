# AOF v2.1.0: Council ベースの組織モデル (.aof/organization.json) に準拠
model: councils
councils:
  - product-council
  - architecture-council
  - operations-council
decision_rules:
  default: 2_of_3 # v2.1.0 既定。hard-coded law ではなく override 可能な policy
  note: Guardian の安全懸念が council で解消しない場合は veto ではなく maintainer へ escalate する
# escalation paths (記述のみ / simple-yaml 非対応の入れ子配列は避ける):
#   role -> council     : ロール間の不一致 / スコープ超過
#   council -> maintainer: 2_of_3 で決し切れない / 不可逆・本番影響・コスト・公開可否
escalation:
  target: human-maintainer
  owner: popcoondev
  max_retries: 2
routing:
  fast_track:
    allowed_when:
      - low-blast-radius
      - reversible
      - low-safety-impact
assignment_authority:
  mode: parent-orchestrator
  owner: runtime
  override_allowed: human-maintainer
non_requirements_guarded:
  - no-gameplay
  - no-free-move-in-viewer
  - not-a-heavy-blender-like-dcc
  - prioritize-operation-naturalness-and-presentation-quality-over-feature-count
